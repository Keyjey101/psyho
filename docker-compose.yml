version: '3.9'

services:
  mail:
    image: mwader/postfix-relay
    environment:
      - POSTFIX_MYDOMAIN=${SMTP_DOMAIN:-ekbmassage.online}
    restart: unless-stopped
    networks:
      - internal

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - ZAI_API_KEY=${ZAI_API_KEY}
      - ZAI_BASE_URL=${ZAI_BASE_URL:-https://api.zai.chat/v1}
      - ZAI_MODEL=${ZAI_MODEL:-glm-5}
      - ZAI_SMALL_MODEL=${ZAI_SMALL_MODEL:-glm-4-flash}
      - SECRET_KEY=${SECRET_KEY}
      - ADMIN_EMAILS=${ADMIN_EMAILS:-}
      - ENVIRONMENT=production
      - SESSION_MAX_EXCHANGES=${SESSION_MAX_EXCHANGES}
      - ADMIN_TELEGRAM_USERNAMES=${ADMIN_TELEGRAM_USERNAMES:-}
      - DATABASE_URL=sqlite+aiosqlite:////data/psyho.db
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - TEST_PASSWORD_CODE=${TEST_PASSWORD_CODE:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_BOT_USERNAME=${TELEGRAM_BOT_USERNAME:-}
      - SMTP_HOST=mail
      - SMTP_PORT=25
      - SMTP_USER=
      - SMTP_PASS=
      - SMTP_FROM=${SMTP_FROM:-noreply@ekbmassage.online}
      - SMTP_TLS=false
    volumes:
      - sqlite_data:/data
    restart: unless-stopped
    expose:
      - "8000"
    depends_on:
      - mail
    networks:
      - internal
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_TG_BOT_USERNAME=${VITE_TG_BOT_USERNAME:-}
        - SESSION_MAX_EXCHANGES=${SESSION_MAX_EXCHANGES}
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - internal

networks:
  internal:

volumes:
  sqlite_data:
